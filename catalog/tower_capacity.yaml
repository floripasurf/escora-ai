# Tower capacity curve — Orguel p.86
# Capacity decreases with number of 1.5m modules (Euler buckling).
#
# CORRECTION (manual §13.2, §23.9): The Orguel chart axis is labeled
# "Carga no montante kN" but the plotted values (2000, 1900, ..., 1470) are
# actually in kgf per montante (one of the 4 corner posts of the tower).
# To obtain total tower capacity multiply by 4 montantes; to convert to kN
# multiply by 9.80665e-3.
#
# Field naming convention:
#   capacity_kgf_per_montante: original Orguel chart value
#   capacity_kn_per_tower:     4 montantes × kgf × 9.80665e-3
#
# NOTE: Module 14 shows 1500 in the original PDF but this breaks the
# monotonic curve. Almost certainly a typo for 1590. Flagged as
# TODO(engineer-confirmation). Until confirmed, system flags any
# 14-module placement for engineer review.

description: "Torre de escoramento Orguel — curva de capacidade por módulos"
module_height_m: 1.5

# Reference fields (per montante / kgf) match Orguel chart exactly.
# Engine consumers should use shoring_towers.json (already converted).
curve:
  - { modules: 1,  height_m: 1.5,  capacity_kgf_per_montante: 2000, capacity_kn_per_tower: 78.5 }
  - { modules: 2,  height_m: 3.0,  capacity_kgf_per_montante: 1900, capacity_kn_per_tower: 74.5 }
