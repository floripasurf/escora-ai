<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(207,255,26,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0B"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Structural grid (subtle) -->
  <g stroke="#1E1E25" stroke-width="0.5" opacity="0.6">
    <line x1="100" y1="80" x2="100" y2="550"/>
    <line x1="300" y1="80" x2="300" y2="550"/>
    <line x1="500" y1="80" x2="500" y2="550"/>
    <line x1="700" y1="80" x2="700" y2="550"/>
    <line x1="900" y1="80" x2="900" y2="550"/>
    <line x1="1100" y1="80" x2="1100" y2="550"/>
    <line x1="60" y1="160" x2="1140" y2="160"/>
    <line x1="60" y1="315" x2="1140" y2="315"/>
    <line x1="60" y1="470" x2="1140" y2="470"/>
  </g>

  <!-- Shore markers (hexagons) -->
  <g fill="none" stroke="#CFFF1A" stroke-width="1.5" opacity="0.3">
    <polygon points="200,160 210,165 210,175 200,180 190,175 190,165"/>
    <polygon points="400,160 410,165 410,175 400,180 390,175 390,165"/>
    <polygon points="600,315 610,320 610,330 600,335 590,330 590,320"/>
    <polygon points="800,315 810,320 810,330 800,335 790,330 790,320"/>
    <polygon points="1000,470 1010,475 1010,485 1000,490 990,485 990,475"/>
  </g>

  <!-- Tower markers (double squares) -->
  <g fill="none" stroke="#CFFF1A" stroke-width="1.2" opacity="0.25">
    <rect x="285" y="300" width="30" height="30"/>
    <rect x="290" y="305" width="20" height="20"/>
    <rect x="685" y="145" width="30" height="30"/>
    <rect x="690" y="150" width="20" height="20"/>
    <rect x="885" y="455" width="30" height="30"/>
    <rect x="890" y="460" width="20" height="20"/>
  </g>

  <!-- VM beam rails (parallel lines) -->
  <g stroke="#CFFF1A" stroke-width="1" opacity="0.2">
    <line x1="100" y1="157" x2="500" y2="157"/>
    <line x1="100" y1="163" x2="500" y2="163"/>
    <line x1="500" y1="312" x2="900" y2="312"/>
    <line x1="500" y1="318" x2="900" y2="318"/>
  </g>

  <!-- Logo mark: stylized "E" made of structural elements -->
  <g transform="translate(440, 190)">
    <!-- Main vertical -->
    <rect x="0" y="0" width="8" height="120" fill="#CFFF1A" rx="1"/>
    <!-- Top beam -->
    <rect x="0" y="0" width="80" height="8" fill="#CFFF1A" rx="1"/>
    <!-- Middle beam -->
    <rect x="0" y="56" width="60" height="8" fill="#CFFF1A" rx="1"/>
    <!-- Bottom beam -->
    <rect x="0" y="112" width="80" height="8" fill="#CFFF1A" rx="1"/>
    <!-- Shore dots on beams -->
    <circle cx="30" cy="4" r="3" fill="#0A0A0B" stroke="#CFFF1A" stroke-width="1"/>
    <circle cx="60" cy="4" r="3" fill="#0A0A0B" stroke="#CFFF1A" stroke-width="1"/>
    <circle cx="30" cy="60" r="3" fill="#0A0A0B" stroke="#CFFF1A" stroke-width="1"/>
    <circle cx="30" cy="116" r="3" fill="#0A0A0B" stroke="#CFFF1A" stroke-width="1"/>
    <circle cx="60" cy="116" r="3" fill="#0A0A0B" stroke="#CFFF1A" stroke-width="1"/>
  </g>

  <!-- Brand text -->
  <text x="550" y="280" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="52" fill="#F5F5F7" letter-spacing="-1.5">estrutura</text>
  <text x="550" y="280" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="52" fill="#CFFF1A" letter-spacing="-1.5" dx="270">.app</text>

  <!-- Tagline -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="24" fill="#A1A1AA" text-anchor="middle" letter-spacing="-0.3">Projetos de escoramento em segundos com inteligência artificial</text>

  <!-- Bottom feature pills -->
  <g transform="translate(600, 400)" text-anchor="middle">
    <g transform="translate(-280, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="none" stroke="#26262E" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="12" fill="#A1A1AA" text-anchor="middle">DXF / DWG</text>
    </g>
    <g transform="translate(-140, 0)">
      <rect x="-50" y="-14" width="100" height="28" rx="14" fill="none" stroke="#26262E" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="12" fill="#A1A1AA" text-anchor="middle">BIM / IFC</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="none" stroke="#26262E" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="12" fill="#A1A1AA" text-anchor="middle">NBR 15696</text>
    </g>
    <g transform="translate(140, 0)">
      <rect x="-50" y="-14" width="100" height="28" rx="14" fill="none" stroke="#26262E" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="12" fill="#A1A1AA" text-anchor="middle">Romaneio</text>
    </g>
    <g transform="translate(280, 0)">
      <rect x="-60" y="-14" width="120" height="28" rx="14" fill="none" stroke="#26262E" stroke-width="1"/>
      <text y="5" font-family="monospace" font-size="12" fill="#A1A1AA" text-anchor="middle">Mem. Cálculo</text>
    </g>
  </g>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#26262E" stroke-width="1"/>
</svg>
