# fly.toml app configuration file for escora-ai
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'escora-ai'
primary_region = 'gru'

[build]

[env]
  ESCORA_DATA_DIR = '/data'
  ESCORA_LOCADORAS_FILE = '/data/locadoras.json'

[[mounts]]
  source = 'escora_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
